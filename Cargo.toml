[package]
name         = "signal-schema"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.89"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/signal-schema"
description  = "Signal contract for live schema package loading and Rust emission."
publish      = false
links        = "signal-schema"
build        = "build.rs"

[lib]
name = "signal_schema"
path = "src/lib.rs"

[features]
default = ["nota-text"]
nota-text = ["dep:nota", "signal-frame/nota-text"]

[[test]]
name = "round_trip"
path = "tests/round_trip.rs"
required-features = ["nota-text"]

[dependencies]
nota         = { package = "nota", git = "https://github.com/LiGoldragon/nota.git", branch = "main", optional = true }
rkyv         = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }
signal-frame = { git = "https://github.com/LiGoldragon/signal-frame.git", branch = "main", default-features = false }
thiserror    = "2"

[build-dependencies]
schema      = { git = "https://github.com/LiGoldragon/schema.git", branch = "trueschema" }
schema-rust = { git = "https://github.com/LiGoldragon/schema-rust.git", branch = "trueschema" }

[lints.rust]
unsafe_code = "forbid"
unused      = { level = "warn", priority = -1 }
dead_code   = "warn"
